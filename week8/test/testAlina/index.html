<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            gap: 25px;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px 0;
        }

        .test-card {
            width: 500px;
            box-sizing: border-box;
            min-height: 250px;
            padding: 15px;
            border-radius: 25px;
            border: 10px solid #ccc;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .test-card h3 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .result-box {
            width: 90%;
            margin-top: 10px;
            padding: 10px;
            background: #eee;
            border-radius: 6px;
            height: 145px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <!-- USERS -->
    <div class="test-card" id="getFriendships">
        <h3>1. GET FRIENDSHIPS</h3>
        <div class="result-box"></div>
    </div>

    <div class="test-card" id="postFriendship">
        <h3>2. POST FRIENDSHIP</h3>
        <div class="result-box"></div>
    </div>

    <div class="test-card" id="deleteFriendship">
        <h3>3. DELETE FRIENDSHIP</h3>
        <div class="result-box"></div>
    </div>


    <!-- USERS_GROUPS -->
    <div class="test-card" id="getUsersCalendars">
        <h3>4. GET USER CALENDARS</h3>
        <div class="result-box"></div>
    </div>

    <div class="test-card" id="postUsersCalendars">
        <h3>5. POST USERS CALENDARS</h3>
        <div class="result-box"></div>
    </div>

    <div class="test-card" id="badPostUsersCalendars">
        <h3>6. Bad POST USER Calendars</h3>
        <div class="result-box"></div>
    </div>
        <div class="test-card" id="postNoUsersCalendars">
        <h3>7. POST NO USERS CALENDARS</h3>
        <div class="result-box"></div>
    </div>
    <div class="test-card" id="postAlreadyInUsersCalendars">
        <h3>8. POST ALREADY IN USERS CALENDARS</h3>
    <div class="result-box"></div>
    </div>

    <div class="test-card" id="deleteUsersCalendars">
        <h3>9. DELETE USER CALENDAR</h3>
        <div class="result-box"></div>
    </div>
    <div class="test-card" id="deleteUsersCalMissing">
        <h3>10. DELETE USER CALENDAR MISSING</h3>
        <div class="result-box"></div>
    </div>
    <div class="test-card" id="deleteUsersCalNotFound">
        <h3>DELETE USER CALENDAR NOT FOUND</h3>
        <div class="result-box"></div>
    </div>

    <script src="index.js"></script>
</body>

</html>
