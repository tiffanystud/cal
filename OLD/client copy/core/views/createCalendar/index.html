<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
                <link rel="stylesheet" href="/CalApp/client/core/views/createCalendar/createCalendarView.css">
            <h2>Create new calendar</h2>

            <app-input
                label="Calendar name"
                placeholder="Enter name"
                width="100%"
                id="calName"
            ></app-input>
            
            <app-input
                label="Description"
                placeholder="Enter description of the group"
                width="100%"
                height="100px"
                id="calDesc"
            ></app-input>
            
            <toggle-btn
                inactive-header-text="Make calendar public"
                inactive-info-text="If privare only members will be able to see calendar"
                active-header-text="Make calendar public"
                active-info-text="Calendar is now set to public and will be available to all users"
            ></toggle-btn>
            
            <div class="container-calendar-members">
                
                <h3>Members</h3>
                
                <div class="members">
                    
                    <div class="member-cirkle add-member">
                        +
                    </div>
                        
                    <div class="added-members">
                        <div class="member member-cirkle"></div>
                        <div class="member member-cirkle"></div>
                    </div>
                    
                </div>
            </div>
            
            <button id="createBtn">Create</button>
            
            <bottom-nav> </bottom-nav>
    
</body>
</html>
