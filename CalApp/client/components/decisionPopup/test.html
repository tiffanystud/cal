<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .container {
            background-color: white;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            margin: 0 20px;
        }

        .closeContainer {
            display: flex;
            justify-content: right;
        }

        .popupBtnClose {
            width: 20px;
            background-color: transparent;
            border: 0;
            font-size: 20px;
        }

        .popupContainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .popupHeading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .popupCirkle {
            padding: 15px;
            border: 3px solid red;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 40px;
            justify-content: center;
            align-items: center;
            font-family: Verdana;
            color: red;
            display: flex;
        }

        .popupBtnContainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .popupHeader {
            font-family: Verdana;
            font-size: 18px;
            font-weight: 600;
            color: rgb(85, 85, 85);
            margin: 0;
        }

        .popuptext {
            font-size: 15px;
            text-align: center;
            margin-top: 0;
            font-family: Verdana;
        }

        .popupBtnAll {
            padding: 20px 40px;
            background-color: rgb(150, 181, 238);
            border-radius: 50px;
            border: 0;
            font-size: 15px;
        }

        .popupBtnCancel:hover {
            background-color: rgb(104, 143, 216);
        }

        .popupBtnDelete {
            background-color: transparent;
            color: red;
        }
    </style>
</head>

<body>
    <div class="modal-backdrop hidden">
        <div class="container">

            <div class="closeContainer">
                <button class="popupBtnClose">x</button>
            </div>
            
            <div class="popupContainer">
                <div class="popupHeading">
                    <div class="popupCirkle">x</div>
                    <h3 class="popupHeader">Are you sure?</h3>
                </div>
                <p class="popuptext">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Excepturi alias nemo, ut, similique porro numquam.</p>
                <div class="popupBtnContainer">
                    <button class="popupBtnCancel popupBtnAll">No, cancel</button>
                    <button class="popupBtnDelete popupBtnAll">Yes, delete</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
